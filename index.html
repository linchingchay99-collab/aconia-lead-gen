<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Score de Maturité Appels d'Offres — Aconia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
 :root {
    --paper: #FFFFFF;
    --card: #F4F7FC;
    --border: #E2E8F0;
    --ink: #0B1629;
    --muted: #4A5568;
    --accent: #FF6B00;
    --accent-dark: #E05E00;
    --green: #00A878;
    --orange: #FF6B00;
    --red: #CC2B2B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.6;
  }

  h1, h2, h3, h4 {
    font-family: 'Syne', sans-serif;
    line-height: 1.15;
  }

 <nav>
  <div class="logo">Aconia<span>.</span></div>
  <div style="display: flex; gap: 24px; align-items: center;">
    <a href="#a-propos">À propos</a>
    <a href="#contact">Contact</a>
   
  </div>
  <a href="diagnostic.html" class="nav-cta">Accéder au diagnostic →</a>
</nav>
<!-- HERO -->
<div class="hero" id="hero">
  <div>
    <div class="hero-badge">Outil de diagnostic gratuit</div>
    <h1>Votre organisation est-elle <em>prête</em> à gagner des appels d'offres ?</h1>
    <p>En 4 minutes, évaluez votre maturité sur les appels d'offres B2B et identifiez vos leviers prioritaires pour augmenter votre taux de succès.</p>
    <a href="diagnostic.html" class="hero-cta">Faire le diagnostic gratuit →</a>
    <div class="hero-sub">
      <span>✓ 7 questions</span>
      &nbsp;·&nbsp;
      <span>Résultats immédiats</span>
      &nbsp;·&nbsp;
      <span>Sans engagement</span>
    </div>
  </div>
  <div class="hero-visual">
    <div class="score-ring">
      <div class="score-inner">
        <div class="score-num">68</div>
        <div class="score-label">/100</div>
      </div>
    </div>
    <ul class="dimension-list">
      <li><span>Veille & détection</span><div class="dim-bar"><div class="dim-fill" style="width:45%"></div></div></li>
      <li><span>Qualification GO/NOGO</span><div class="dim-bar"><div class="dim-fill" style="width:80%"></div></div></li>
      <li><span>Structuration de l'offre</span><div class="dim-bar"><div class="dim-fill" style="width:60%"></div></div></li>
      <li><span>Pilotage commercial</span><div class="dim-bar"><div class="dim-fill" style="width:70%"></div></div></li>
    </ul>
  </div>
</div>

<!-- PROBLEM SECTION -->
<section id="probleme">
  <div class="section-eyebrow">Pourquoi ce diagnostic ?</div>
  <h2>La plupart des entreprises perdent des appels d'offres pour les mauvaises raisons</h2>
  <p>Pas par manque de compétences — mais par manque de méthode. Ce diagnostic vous aide à identifier exactement où vous perdez du terrain.</p>
  <div class="problem-grid">
    <div class="problem-card">
      <div class="problem-icon">📡</div>
      <h3>Détection tardive</h3>
      <p>Les opportunités sont identifiées trop tard pour construire une offre différenciée et crédible.</p>
    </div>
    <div class="problem-card">
      <div class="problem-icon">📋</div>
      <h3>Offres trop génériques</h3>
      <p>Les réponses ne parlent pas au décideur. Elles répondent au cahier des charges, pas aux enjeux réels.</p>
    </div>
    <div class="problem-card">
      <div class="problem-icon">🎯</div>
      <h3>Mauvais filtrage GO/NOGO</h3>
      <p>On répond à tout par principe, sans distinguer les appels d'offres qui méritent un investissement sérieux.</p>
    </div>
  </div>
</section>
<section id="a-propos" style="padding: 60px 48px; background: var(--card); border-top: 1px solid var(--border);">
    <div style="max-width: 800px; margin: 0 auto; text-align: center;">
      <h2 style="font-size: 2rem; color: var(--ink); margin-bottom: 20px;">À propos d'ACONIA</h2>
      <p style="font-size: 1.1rem; color: var(--muted); line-height: 1.8; max-width: 650px; margin: 0 auto;">
        <strong style="color: var(--ink);">ACONIA.FR</strong> est un site Internet spécialisé dans la formation et l’accompagnement des TPE sur les réponses aux appels d’offres et marchés publics.
      </p>
    </div>
  </section>

  <section id="contact" style="padding: 60px 48px; background: var(--paper); border-top: 1px solid var(--border);">
    <div style="max-width: 500px; margin: 0 auto;">
      <h2 style="font-size: 2rem; color: var(--ink); margin-bottom: 10px; text-align: center;">Contactez-nous</h2>
      <p style="text-align: center; color: var(--muted); margin-bottom: 30px;">Une question ? Notre équipe vous répond dans les plus brefs délais.</p>
      
      <form onsubmit="event.preventDefault(); alert('Message envoyé avec succès !');" style="display: flex; flex-direction: column; gap: 15px;">
        <div>
          <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 5px; color: var(--ink);">Nom complet</label>
          <input type="text" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--ink); font-family: inherit;">
        </div>
        <div>
          <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 5px; color: var(--ink);">Adresse email</label>
          <input type="email" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--ink); font-family: inherit;">
        </div>
        <div>
          <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 5px; color: var(--ink);">Message</label>
          <textarea required rows="4" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--ink); font-family: inherit; resize: vertical;"></textarea>
        </div>
        <button type="submit" style="background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; font-size: 1rem; margin-top: 10px;">
          Envoyer le message
        </button>
      </form>
    </div>
  </section>


<!-- FOOTER -->
<footer id="contact">
  <p style="margin-bottom:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;">Aconia — Appels d'offres B2B</p>
  <p>Ce document est un kit complet prêt à déployer dans Typeform + votre CRM.</p>
  <p style="margin-top:12px;font-size:0.75rem;">© 2025 Aconia · Tous droits réservés</p>
</footer>

</body>
</html>
