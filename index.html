<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aconia - Score de Maturité Appels d'Offres</title>
    <style>
        /* Styles Globaux & Thème Dark Mode */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0B1629;
            color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #13223C;
            max-width: 600px;
            width: 100%;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            border: 1px solid #1A4FFF33;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #FFFFFF;
            text-align: center;
        }

        p.subtitle {
            color: #8A99AD;
            text-align: center;
            margin-bottom: 30px;
            font-size: 15px;
        }

        /* Styles du Quiz */
        .question-card {
            display: none;
        }

        .question-card.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .progress-bar-container {
            background-color: #1C3055;
            border-radius: 10px;
            height: 8px;
            width: 100%;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: #1A4FFF;
            height: 100%;
            width: 14%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .options-list {
            list-style: none;
        }

        .option-item {
            background-color: #1C3055;
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
        }

        .option-item:hover {
            border-color: #1A4FFF;
            background-color: #223A66;
        }

        /* Écran de Résultats */
        .results-screen {
            display: none;
            text-align: center;
        }

        .results-screen.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 6px solid #1A4FFF;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            background-color: #1C3055;
        }

        .score-number {
            font-size: 48px;
            font-weight: bold;
            color: #FFFFFF;
        }

        .profile-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .profile-debutant { background-color: #E65100; color: #FFF; }
        .profile-intermediaire { background-color: #F57C00; color: #FFF; }
        .profile-avance { background-color: #388E3C; color: #FFF; }

        .profile-desc {
            color: #B0C4DE;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Bouton d'action final (Calendly) */
        .cta-button {
            display: inline-block;
            background-color: #1A4FFF;
            color: white;
            text-decoration: none;
            padding: 15px 32px;
            font-weight: bold;
            border-radius: 8px;
            transition: background-color 0.2s;
            box-shadow: 0 4px 12px rgba(26, 79, 255, 0.3);
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        .cta-button:hover {
            background-color: #0035C7;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-container">
        <h1>Maturité Appels d'Offres</h1>
        <p class="subtitle">Évaluez votre performance B2B en 7 questions</p>
        
        <div class="progress-bar-container">
            <div class="progress-bar" id="progress"></div>
        </div>

        <div id="questions"></div>
    </div>

    <div id="results" class="results-screen">
        <h1>Votre Diagnostic Global</h1>
        <p class="subtitle">Analyse de performance Aconia</p>
        
        <div class="score-circle">
            <span class="score-number" id="final-score">0</span>
        </div>
        
        <div id="profile-tag" class="profile-badge">Profil</div>
        <p id="profile-text" class="profile-desc">Analyse en cours...</p>
        
        <a href="https://calendly.com" target="_blank" class="cta-button">Prendre rendez-vous avec un expert</a>
    </div>
</div>

<script>
    // Données des 7 questions de diagnostic adaptées au B2B / Appels d'offres
    const quizData = [
        {
            question: "1. Comment sélectionnez-vous les appels d'offres auxquels vous répondez ?",
            options: [
                { text: "Au feeling, on répond à presque tout", points: 5 },
                { text: "On a quelques critères flous (taille, budget)", points: 10 },
                { text: "On utilise une grille de Go/No-Go stricte et chiffrée", points: 15 }
            ]
        },
        {
            question: "2. Quel est votre taux de réussite (Win Rate) actuel sur vos réponses ?",
            options: [
                { text: "Moins de 20%", points: 5 },
                { text: "Entre 20% et 40%", points: 10 },
                { text: "Plus de 40%", points: 15 }
            ]
        },
        {
            question: "3. Disposez-vous d'une bibliothèque de contenus (réponses types, CVs, références) à jour ?",
            options: [
                { text: "Non, on réécrit tout à chaque fois en urgence", points: 0 },
                { text: "Oui, mais elle n'est pas centralisée ni triée", points: 10 },
                { text: "Oui, elle est parfaitement automatisée et optimisée", points: 15 }
            ]
        },
        {
            question: "4. À quel point personnalisez-vous votre mémoire technique ?",
            options: [
                { text: "On change juste le nom du client sur un modèle type", points: 5 },
                { text: "On adapte la partie technique, le reste est générique", points: 10 },
                { text: "Ultra-personnalisation centrée sur les enjeux clés du client", points: 15 }
            ]
        },
        {
            question: "5. Comment gérez-vous le planning et les délais de rendu ?",
            options: [
                { text: "C'est souvent le stress et la course jusqu'à la dernière minute", points: 5 },
                { text: "On rend à l'heure, mais l'organisation interne est chaotique", points: 10 },
                { text: "Processus fluide avec des jalons de relecture clairs", points: 15 }
            ]
        },
        {
            question: "6. Faites-vous une soutenance orale systématique en phase finale ?",
            options: [
                { text: "Rarement, et on la prépare la veille", points: 5 },
                { text: "Oui, mais on se contente de relire nos slides", points: 10 },
                { text: "Oui, ultra-préparée avec pitch percutant et rôles définis", points: 15 }
            ]
        },
        {
            question: "7. Analysez-vous vos échecs auprès des acheteurs publics/privés ?",
            options: [
                { text: "Jamais, on passe directement au dossier suivant", points: 0 },
                { text: "Parfois, si le client accepte de nous faire un retour écrit", points: 5 },
                { text: "Systématiquement via un débriefing approfondi", points: 10 }
            ]
        }
    ];

    let currentQuestionIndex = 0;
    let totalScore = 0;

    const questionsContainer = document.getElementById('questions');
    const progressBar = document.getElementById('progress');
    const quizContainer = document.getElementById('quiz-container');
    const resultsScreen = document.getElementById('results');

    // Génération et affichage du Quiz
    function initQuiz() {
        quizData.forEach((q, index) => {
            const card = document.createElement('div');
            card.classList.add('question-card');
            if (index === 0) card.classList.add('active');
            card.id = `q-${index}`;

            const qText = document.createElement('div');
            qText.classList.add('question-text');
            qText.innerText = q.question;
            card.appendChild(qText);

            const optionsList = document.createElement('ul');
            optionsList.classList.add('options-list');

            q.options.forEach(opt => {
                const li = document.createElement('li');
                li.classList.add('option-item');
                li.innerText = opt.text;
                li.addEventListener('click', () => handleAnswer(opt.points));
                optionsList.appendChild(li);
            });

            card.appendChild(optionsList);
            questionsContainer.appendChild(card);
        });
    }

    // Gestion du clic sur une réponse
    function handleAnswer(points) {
        totalScore += points;
        
        // Cacher la question actuelle
        document.getElementById(`q-${currentQuestionIndex}`).classList.remove('active');
        currentQuestionIndex++;

        if (currentQuestionIndex < quizData.length) {
            // Afficher la question suivante
            document.getElementById(`q-${currentQuestionIndex}`).classList.add('active');
            // Mettre à jour la barre de progression
            progressBar.style.width = `${((currentQuestionIndex + 1) / quizData.length) * 100}%`;
        } else {
            // Fin du quiz, afficher les résultats
            showResults();
        }
    }

    // Traitement et affichage des profils de résultats
    function showResults() {
        quizContainer.style.display = 'none';
        resultsScreen.classList.add('active');

        // Détermination du profil selon le score (Max théorique ici = 100)
        const tag = document.getElementById('profile-tag');
        const text = document.getElementById('profile-text');

        tag.className = 'profile-badge'; // reset

        if (totalScore <= 40) {
            tag.innerText = "Profil Débutant";
            tag.classList.add('profile-debutant');
            text.innerText = "Votre structure commerciale découvre les exigences des appels d'offres. Vos dossiers manquent encore de standardisation, ce qui pénalise votre taux de conversion. Un accompagnement méthodologique vous ferait gagner un temps précieux.";
        } else if (totalScore > 40 && totalScore <= 70) {
            tag.innerText = "Profil Intermédiaire";
            tag.classList.add('profile-intermediaire');
            text.innerText = "Vous maîtrisez les bases et remportez régulièrement des marchés. Cependant, le manque d'outils automatisés et de personnalisation poussée vous bloque pour passer à la vitesse supérieure. Optimisons ensemble vos processus !";
        } else {
            tag.innerText = "Profil Avancé";
            tag.classList.add('profile-avance');
            text.innerText = "Bravo ! Votre organisation est redoutable et vos processus de Go/No-Go portent leurs fruits. Pour maintenir ce niveau d'excellence et capter des marchés encore plus complexes, passons en revue vos derniers détails stratégiques.";
        }

        // Animation du compteur de score
        animateScore(totalScore);
    }

    // Fonction d'animation du compteur numérique
    function animateScore(target) {
        const scoreElement = document.getElementById('final-score');
        let current = 0;
        const duration = 1200; // Durée totale en ms
        const increment = target / (duration / 16); // ~60fps

        const counter = setInterval(() => {
            current += increment;
            if (current >= target) {
                scoreElement.innerText = Math.round(target);
                clearInterval(counter);
            } else {
                scoreElement.innerText = Math.round(current);
            }
        }, 16);
    }

    // Lancement du script au chargement
    initQuiz();
</script>

</body>
</html>
