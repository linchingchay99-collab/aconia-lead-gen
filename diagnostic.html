<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostic de Maturité — Aconia</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0B0F1A;
    --paper: #F5F2EC;
    --accent: #FF6B00; /* Orange Aconia */
    --accent-dark: #E05E00;
    --muted: #6B7280;
    --border: #D6D0C4;
    --green: #00A878;
    --orange: #FF6B00;
    --red: #CC2B2B;
    --card: #FEFCF8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.6;
  }

  h1, h2, h3 {
    font-family: 'Syne', sans-serif;
    line-height: 1.15;
  }

  /* ── BARRE DE NAVIGATION (IDENTIQUE À L'ACCUEIL) ── */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    border-bottom: 1px solid var(--border);
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    text-decoration: none;
  }
  .nav-logo img {
    height: 40px;
    width: auto;
    object-fit: contain;
  }
  .nav-right-group {
    display: flex;
    gap: 32px;
    align-items: center;
  }
  .nav-links {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  nav a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: color 0.2s;
  }
  nav a:hover { color: var(--ink); }
  .nav-cta {
    background: var(--ink);
    color: var(--paper) !important;
    padding: 10px 22px;
    border-radius: 6px;
    font-size: 0.875rem !important;
    font-weight: 600;
    text-decoration: none;
  }
  .nav-cta:hover { background: var(--accent) !important; color: #fff !important; }

  /* ── CONTENEUR DU DIAGNOSTIC ── */
  .diagnostic-container {
    max-width: 650px;
    margin: 60px auto 90px;
    padding: 0 24px;
  }

  .diagnostic-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.03);
  }

  .progress-container {
    margin-bottom: 32px;
  }
  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: #E8EEFF;
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 15%; /* Progression exemple */
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .question-title {
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 24px;
    letter-spacing: -0.02em;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-item {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    background: transparent;
    transition: all 0.2s;
    font-family: inherit;
    font-size: 0.95rem;
    text-align: left;
    color: var(--ink);
  }

  .option-item:hover {
    border-color: var(--accent);
    background: rgba(255, 107, 0, 0.02);
  }

  .option-letter {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    margin-right: 16px;
    background: var(--paper);
    flex-shrink: 0;
  }

  .option-item:hover .option-letter {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 40px 24px;
    border-top: 1px solid var(--border);
    font-size: 0.82rem;
    color: var(--muted);
    background: var(--paper);
  }

  @media (max-width: 768px) {
    nav { padding: 16px 20px; flex-direction: column; gap: 16px; }
    .nav-right-group { flex-direction: column; gap: 16px; }
    .diagnostic-card { padding: 28px 20px; }
  }
</style>
</head>
<body>
